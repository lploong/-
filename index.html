// Helper: add a 2-wide pipe
function addPipe(map, c, h) {
  for (let r = 13 - h; r <= 12; r++) {
    map[r][c] = TILE.PIPE_TL;
    map[r][c + 1] = TILE.PIPE_TR;
  }
  map[13][c] = TILE.PIPE_BL; map[13][c + 1] = TILE.PIPE_BR;
  map[14][c] = TILE.PIPE_BL; map[14][c + 1] = TILE.PIPE_BR;
}
function addBlock(map, c, r, type) { map[r][c] = type; }
function addGround(map, from, to) {
  for (let c = from; c <= to; c++) {
    map[13][c] = TILE.GROUND;
    map[14][c] = TILE.GROUND;
  }
}
// Fake bricks: decorative, pass-through, look slightly different
function addFakeRow(map, col, row, count) {
  for (let i = 0; i < count; i++) {
    map[row][col + i] = TILE.FAKE_BRICK;

}

const ENEMY_SPAWNS = {
  1: [{col:22, row:12}, {col:40, row:12}, {col:80, row:12}, {col:110, row:12}, {col:150, row:12}],
  2: [{col:12, row:12}, {col:30, row:12}, {col:50, row:12}, {col:70, row:12}, {col:90, row:12}, {col:130, row:12}],

};

// ==================== HELPER: TILE COLLISION ====================
function isSolid(tileType) {
  return tileType === TILE.GROUND || tileType === TILE.BRICK ||
         tileType === TILE.QUESTION || tileType === TILE.USED ||
         tileType === TILE.PIPE_TL || tileType === TILE.PIPE_TR ||
         tileType === TILE.PIPE_BL || tileType === TILE.PIPE_BR;
  // NOTE: FAKE_BRICK is NOT solid - pass through!
}

function getTile(map, col, row) {
  if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return TILE.AIR;
  return map[row][col];
}

// ==================== PLAYER CLASS ====================
class Player {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = 3 * TILE_SIZE;
    this.y = 13 * TILE_SIZE - PLAYER_HEIGHT;
    this.vx = 0;
    this.vy = 0;
    this.width = PLAYER_WIDTH;
    this.height = PLAYER_HEIGHT;
    this.onGround = false;
    this.facingRight = true;
    this.animFrame = 0;
    this.animTimer = 0;
    this.isInvincible = false;
    this.invincibleTimer = 0;
    this.deadTimer = 0;
  }

  update(map, keys, bumpBlocks) {
    if (this.deadTimer > 0) {
      this.deadTimer--;
      this.vy += GRAVITY;
      this.y += this.vy;
      return;
    }

    if (this.isInvincible) {
      this.invincibleTimer--;
      if (this.invincibleTimer <= 0) this.isInvincible = false;
    }

    // Horizontal movement
    if (keys.left) {
      this.vx -= MOVE_ACCEL;
      this.facingRight = false;
    } else if (keys.right) {
      this.vx += MOVE_ACCEL;
      this.facingRight = true;
    } else {
      if (this.vx > 0) this.vx = Math.max(0, this.vx - FRICTION);
      else if (this.vx < 0) this.vx = Math.min(0, this.vx + FRICTION);
    }

    // Jump
    if ((keys.jump || keys.up) && this.onGround) {
      this.vy = JUMP_FORCE;
      this.onGround = false;
    }

    // Variable jump height
    if (!keys.jump && !keys.up && this.vy < -4) {
      this.vy = -4;
    }

    this.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, this.vx));

    // Gravity
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

    // Vertical collision
    this.y += this.vy;
    this.resolveVerticalCollision(map, bumpBlocks);

    // Horizontal collision
    this.x += this.vx;
    this.resolveHorizontalCollision(map);

    if (this.x < 0) this.x = 0;
    if (this.x > MAP_WIDTH - this.width) this.x = MAP_WIDTH - this.width;

    // Fell off map
    if (this.y > MAP_HEIGHT + 64) {
      this.die();
    }

    // Animation
    if (!this.onGround) {
      this.animFrame = 2;
    } else if (Math.abs(this.vx) > 0.5) {
      this.animTimer++;
      if (this.animTimer > 8) { this.animTimer = 0; this.animFrame = this.animFrame === 0 ? 1 : 0; }
    } else {
      this.animFrame = 0; this.animTimer = 0;
    }
  }

  resolveVerticalCollision(map, bumpBlocks) {
    const left = Math.floor(this.x / TILE_SIZE);
    const right = Math.floor((this.x + this.width - 1) / TILE_SIZE);
    const top = Math.floor(this.y / TILE_SIZE);
    const bottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);
    this.onGround = false;

    if (this.vy > 0) {
      for (let c = left; c <= right; c++) {
        if (isSolid(getTile(map, c, bottom))) {
          this.y = bottom * TILE_SIZE - this.height;
          this.vy = 0;
          this.onGround = true;
          break;
        }
      }
    } else if (this.vy < 0) {
      for (let c = left; c <= right; c++) {
        if (isSolid(getTile(map, c, top))) {
          this.y = (top + 1) * TILE_SIZE;
          this.vy = 0;
          const key = `${c},${top}`;
          const tile = getTile(map, c, top);
          if ((tile === TILE.QUESTION || tile === TILE.BRICK) && !bumpBlocks.has(key)) {
            bumpBlocks.set(key, { offset: -8, timer: 12, col: c, row: top });
          }
          break;
        }
      }
    }
  }

  resolveHorizontalCollision(map) {
    const left = Math.floor(this.x / TILE_SIZE);
    const right = Math.floor((this.x + this.width - 1) / TILE_SIZE);
    const top = Math.floor(this.y / TILE_SIZE);
    const bottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);

    if (this.vx > 0) {
      for (let r = top; r <= bottom; r++) {
        if (isSolid(getTile(map, right, r))) {
          this.x = right * TILE_SIZE - this.width; this.vx = 0; break;
        }
      }
    } else if (this.vx < 0) {
      for (let r = top; r <= bottom; r++) {
        if (isSolid(getTile(map, left, r))) {
          this.x = (left + 1) * TILE_SIZE; this.vx = 0; break;
        }
      }
    }
  }

  die() { this.deadTimer = 90; this.vy = -8; this.vx = 0; }

  getBounds() { return { x: this.x, y: this.y, w: this.width, h: this.height }; }

  render(ctx, camera) {
    if (this.deadTimer > 0 && this.y > CANVAS_HEIGHT + 100) return;
    if (this.isInvincible && Math.floor(this.invincibleTimer / 4) % 2 === 0) return;

    const sx = Math.round(this.x - camera.x);
    const sy = Math.round(this.y);
    let sprite;
    if (!this.onGround) sprite = MARIO_JUMP;
    else if (this.animFrame === 0) sprite = MARIO_STAND;
    else if (this.animFrame === 1) sprite = MARIO_WALK1;
    else sprite = MARIO_WALK2;
    drawSprite(ctx, sprite, sx, sy, this.facingRight);
  }
}

// ==================== ENEMY CLASS ====================
class Enemy {
  constructor(col, row) {
    this.startX = col * TILE_SIZE + (TILE_SIZE - ENEMY_WIDTH) / 2;
    this.x = this.startX;
    this.y = row * TILE_SIZE + (TILE_SIZE - ENEMY_HEIGHT);
    this.vx = -ENEMY_SPEED;
    this.vy = 0;
    this.width = ENEMY_WIDTH;
    this.height = ENEMY_HEIGHT;
    this.alive = true;
    this.squishTimer = 0;
    this.animTimer = 0;
    this.animFrame = 0;
  }

  update(map) {
    if (!this.alive) { this.squishTimer--; return this.squishTimer <= 0; }

    this.vy += GRAVITY;
    if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

    this.y += this.vy;
    const bottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);
    const left = Math.floor(this.x / TILE_SIZE);
    const right = Math.floor((this.x + this.width - 1) / TILE_SIZE);
    let onGround = false;
    for (let c = left; c <= right; c++) {
      if (isSolid(getTile(map, c, bottom))) {
        this.y = bottom * TILE_SIZE - this.height; this.vy = 0; onGround = true; break;
      }
    }

    this.x += this.vx;
    const newLeft = Math.floor(this.x / TILE_SIZE);
    const newRight = Math.floor((this.x + this.width - 1) / TILE_SIZE);
    const top = Math.floor(this.y / TILE_SIZE);
    const newBottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);

    if (this.vx < 0) {
      for (let r = top; r <= newBottom; r++) {
        if (isSolid(getTile(map, newLeft, r))) { this.x = (newLeft + 1) * TILE_SIZE; this.vx = ENEMY_SPEED; break; }
      }
    } else {
      for (let r = top; r <= newBottom; r++) {
        if (isSolid(getTile(map, newRight, r))) { this.x = newRight * TILE_SIZE - this.width; this.vx = -ENEMY_SPEED; break; }
      }
    }

    if (onGround) {
      const aheadCol = this.vx > 0 ? newRight + 1 : newLeft - 1;
      const belowRow = newBottom + 1;
      if (aheadCol >= 0 && aheadCol < MAP_COLS && belowRow < MAP_ROWS) {
        if (!isSolid(getTile(map, aheadCol, belowRow))) { this.vx = -this.vx; }
      }
    }

    if (this.y > MAP_HEIGHT + 64) { this.alive = false; this.squishTimer = 0; return true; }

    this.animTimer++;
    if (this.animTimer > 15) { this.animTimer = 0; this.animFrame = this.animFrame === 0 ? 1 : 0; }
    return false;
  }

  squish() { this.alive = false; this.squishTimer = 30; }
  getBounds() { if (!this.alive) return null; return { x: this.x, y: this.y, w: this.width, h: this.height }; }

  render(ctx, camera) {
    if (!this.alive && this.squishTimer <= 0) return;
    const sx = Math.round(this.x - camera.x);
    const sy = Math.round(this.y);
    drawSprite(ctx, this.alive ? GOOMBA_SPRITE : GOOMBA_FLAT, sx, sy, true);
  }
}

// ==================== PARTICLE CLASS ====================
class Particle {
  constructor(x, y, vx, vy, type, life) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.type = type; this.life = life || 30; this.maxLife = this.life;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += GRAVITY * 0.5; this.life--; return this.life <= 0; }
  render(ctx, camera) {
    const alpha = Math.min(1, this.life / (this.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    const sx = Math.round(this.x - camera.x), sy = Math.round(this.y);
    if (this.type === 'coin') {
      ctx.fillStyle = '#F8B800'; ctx.fillRect(sx + 4, sy, 8, 14);
      ctx.fillStyle = '#FFE000'; ctx.fillRect(sx + 2, sy + 2, 12, 10);
      ctx.fillStyle = '#F8B800'; ctx.fillRect(sx + 6, sy + 4, 4, 6);
    } else if (this.type === 'brick') {
      ctx.fillStyle = '#C84C0C'; ctx.fillRect(sx, sy, 8, 8);
      ctx.fillStyle = '#A03800'; ctx.fillRect(sx + 1, sy + 1, 6, 6);
    } else if (this.type === 'score') {
      ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 14px "Courier New"'; ctx.fillText('200', sx, sy);
    }
    ctx.globalAlpha = 1;
  }
}

// ==================== SPRITE DRAWING ====================
function drawSprite(ctx, sprite, x, y, facingRight) {
  const pixelSize = 2;
  for (let row = 0; row < sprite.length; row++) {
    for (let col = 0; col < sprite[row].length; col++) {
      const ch = sprite[row][col];
      if (ch === '.') continue;
      const color = COLOR[ch];
      if (!color) continue;
      let drawCol = facingRight ? col : (sprite[row].length - 1 - col);
      ctx.fillStyle = color;
      ctx.fillRect(x + drawCol * pixelSize, y + row * pixelSize, pixelSize, pixelSize);
    }
  }
}

// ==================== TILE RENDERING ====================
function drawTile(ctx, tileType, x, y, bumpOffset) {
  const bx = x, by = y + (bumpOffset || 0);

  switch (tileType) {
    case TILE.GROUND:
      ctx.fillStyle = '#C84C0C'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#A03800';
      for (let r = 0; r < TILE_SIZE; r += 8)
        for (let c = (r % 16 === 0 ? 0 : 16); c < TILE_SIZE; c += 16)
          ctx.fillRect(bx + c, by + r, 16, 4);
      ctx.fillStyle = '#00A800'; ctx.fillRect(bx, by, TILE_SIZE, 4);
      ctx.fillStyle = '#008800'; ctx.fillRect(bx, by + 4, TILE_SIZE, 2);
      break;

    case TILE.BRICK:
      ctx.fillStyle = '#C84C0C'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#000000';
      ctx.fillRect(bx + 15, by, 2, TILE_SIZE);
      ctx.fillRect(bx, by + 15, TILE_SIZE, 2);
      ctx.fillRect(bx, by + 7, TILE_SIZE, 1);
      ctx.fillRect(bx + 7, by, 1, TILE_SIZE);
      break;

    case TILE.FAKE_BRICK:
      // Fake brick: darker, semi-transparent look, clearly decorative
      ctx.fillStyle = '#8B6914'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#6B4F10';
      ctx.fillRect(bx + 15, by, 2, TILE_SIZE);
      ctx.fillRect(bx, by + 15, TILE_SIZE, 2);
      ctx.fillRect(bx, by + 7, TILE_SIZE, 1);
      ctx.fillRect(bx + 7, by, 1, TILE_SIZE);
      // Slight transparency overlay to make it look "ghostly"
      ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      break;

    case TILE.QUESTION:
      ctx.fillStyle = '#F8B800'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#D09000';
      ctx.fillRect(bx, by, TILE_SIZE, 2); ctx.fillRect(bx, by, 2, TILE_SIZE);
      ctx.fillRect(bx, by + TILE_SIZE - 2, TILE_SIZE, 2); ctx.fillRect(bx + TILE_SIZE - 2, by, 2, TILE_SIZE);
      ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 20px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('?', bx + TILE_SIZE / 2, by + TILE_SIZE - 10); ctx.textAlign = 'start';
      break;

    case TILE.USED:
      ctx.fillStyle = '#886848'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#6B5038'; ctx.fillRect(bx, by, TILE_SIZE, 2); ctx.fillRect(bx, by, 2, TILE_SIZE);
      break;

    case TILE.PIPE_TL: case TILE.PIPE_TR:
      ctx.fillStyle = '#00A800'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#00D800'; ctx.fillRect(bx + 2, by, TILE_SIZE - 4, TILE_SIZE);
      ctx.fillStyle = '#008800'; ctx.fillRect(bx, by, TILE_SIZE, 3);
      if (tileType === TILE.PIPE_TL) ctx.fillRect(bx, by, 3, TILE_SIZE);
      else ctx.fillRect(bx + TILE_SIZE - 3, by, 3, TILE_SIZE);
      break;

    case TILE.PIPE_BL: case TILE.PIPE_BR:
      ctx.fillStyle = '#00A800'; ctx.fillRect(bx, by, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#00D800'; ctx.fillRect(bx + 2, by, TILE_SIZE - 4, TILE_SIZE);
      ctx.fillStyle = '#008800';
      if (tileType === TILE.PIPE_BL) ctx.fillRect(bx, by, 3, TILE_SIZE);
      else ctx.fillRect(bx + TILE_SIZE - 3, by, 3, TILE_SIZE);
      break;

    case TILE.FLAG_POLE:
      ctx.fillStyle = '#00A800'; ctx.fillRect(bx + 14, by, 4, TILE_SIZE);
      ctx.fillStyle = '#00D800'; ctx.fillRect(bx + 15, by, 2, TILE_SIZE);
      break;

    case TILE.FLAG_TOP:
      ctx.fillStyle = '#00A800'; ctx.fillRect(bx + 14, by, 4, TILE_SIZE);
      ctx.fillStyle = '#00FF00';
      ctx.beginPath(); ctx.moveTo(bx + 16, by); ctx.lineTo(bx + 16, by + 12); ctx.lineTo(bx + 2, by + 6); ctx.closePath();
      ctx.fill();
      break;
  }
}

// ==================== GAME CLASS ====================
class Game {
  constructor() {
    this.state = STATE.START;
    this.score = 0;
    this.coins = 0;
    this.lives = 5; // More lives = easier!
    this.level = 1;
    this.camera = { x: 0, y: 0 };
    this.keys = { left: false, right: false, up: false, jump: false };
    this.map = LEVEL_MAP_FUNCS[1]();
    this.player = new Player();
    this.enemies = [];
    this.particles = [];
    this.bumpBlocks = new Map();
    this.questionBlockStates = new Map();
    this.frameCount = 0;
    this.deathDelay = 0;
    this.winTimer = 0;
    this.levelClearTimer = 0;
    this.initInput();
  }

  initInput() {
    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') { this.keys.left = true; e.preventDefault(); }
      if (e.code === 'ArrowRight') { this.keys.right = true; e.preventDefault(); }
      if (e.code === 'ArrowUp') { this.keys.up = true; e.preventDefault(); }
      if (e.code === 'Space') { this.keys.jump = true; e.preventDefault(); }

      if (this.state === STATE.START) this.startGame();
      if ((this.state === STATE.DEAD || this.state === STATE.WIN) && e.code === 'Space') this.restartGame();
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft') { this.keys.left = false; e.preventDefault(); }
      if (e.code === 'ArrowRight') { this.keys.right = false; e.preventDefault(); }
      if (e.code === 'ArrowUp') { this.keys.up = false; e.preventDefault(); }
      if (e.code === 'Space') { this.keys.jump = false; e.preventDefault(); }
    });
  }

  startGame() {
    this.state = STATE.PLAYING;
    this.score = 0; this.coins = 0; this.lives = 5; this.level = 1;
    this.loadLevel(1);
    this.camera.x = 0; this.deathDelay = 0; this.winTimer = 0; this.levelClearTimer = 0;
  }

  restartGame() { this.startGame(); }

  loadLevel(lvl) {
    this.level = lvl;
    this.map = LEVEL_MAP_FUNCS[lvl]();
    this.player.reset();
    this.enemies = (ENEMY_SPAWNS[lvl] || []).map(s => new Enemy(s.col, s.row));
    this.particles = [];
    this.bumpBlocks.clear();
    this.questionBlockStates.clear();
    this.camera.x = 0;
  }

  respawnPlayer() {
    this.player.reset();
    this.player.isInvincible = true;
    this.player.invincibleTimer = 120;
    this.camera.x = 0;
    this.deathDelay = 0;
    this.enemies = (ENEMY_SPAWNS[this.level] || []).map(s => new Enemy(s.col, s.row));
    this.particles = [];
    this.bumpBlocks.clear();
    this.questionBlockStates.clear();
    this.map = LEVEL_MAP_FUNCS[this.level]();
    this.state = STATE.PLAYING;
  }

  update() {
    // Level clear transition
    if (this.state === STATE.LEVEL_CLEAR) {
      this.levelClearTimer--;
      if (this.levelClearTimer <= 0) {
        if (this.level >= 3) {
          this.state = STATE.WIN;
          this.winTimer = 180;
        } else {
          this.loadLevel(this.level + 1);
          this.state = STATE.PLAYING;
        }
      }
      return;
    }

    if (this.state !== STATE.PLAYING) {
      if (this.state === STATE.DEAD) {
        this.player.update(this.map, this.keys, this.bumpBlocks);
        this.deathDelay--;
        if (this.deathDelay <= 0 && this.player.y > CANVAS_HEIGHT + 100) {
          if (this.lives <= 0) { /* stay on game over */ }
          else { this.respawnPlayer(); }
        }
      }
      if (this.state === STATE.WIN) { this.winTimer--; }
      return;
    }

    this.frameCount++;

    this.player.update(this.map, this.keys, this.bumpBlocks);

    // Smooth camera
    const targetCamX = this.player.x - CANVAS_WIDTH / 3;
    this.camera.x += (targetCamX - this.camera.x) * 0.1;
    if (this.camera.x < 0) this.camera.x = 0;
    if (this.camera.x > MAP_WIDTH - CANVAS_WIDTH) this.camera.x = MAP_WIDTH - CANVAS_WIDTH;

    this.enemies = this.enemies.filter(e => !e.update(this.map));
    this.particles = this.particles.filter(p => !p.update());

    for (const [key, data] of this.bumpBlocks) {
      data.timer--;
      data.offset = -8 * (data.timer / 12);
      if (data.timer <= 0) this.bumpBlocks.delete(key);
    }

    this.processBumpBlocks();
    this.checkEnemyCollisions();
    this.checkFlagPole();

    if (this.player.y > MAP_HEIGHT + 64 && this.player.deadTimer <= 0) {
      this.playerDie();
    }
  }

  processBumpBlocks() {
    const toProcess = [];
    for (const [key, data] of this.bumpBlocks) {
      if (data.timer === 11) toProcess.push({ key, col: data.col, row: data.row });
    }
    for (const { key, col, row } of toProcess) {
      const tile = this.map[row][col];
      if (tile === TILE.QUESTION) {
        const stateKey = `${col},${row}`;
        if (!this.questionBlockStates.has(stateKey)) {
          this.questionBlockStates.set(stateKey, true);
          this.map[row][col] = TILE.USED;
          this.coins++; this.score += 200;
          const cx = col * TILE_SIZE + TILE_SIZE / 2, cy = row * TILE_SIZE;
          this.particles.push(new Particle(cx - 8, cy - 16, 0, -5, 'coin', 35));
          this.particles.push(new Particle(cx - 10, cy - 20, 0, -2, 'score', 25));
        }
      } else if (tile === TILE.BRICK) {
        this.map[row][col] = TILE.AIR; this.score += 50;
        const bx = col * TILE_SIZE, by = row * TILE_SIZE;
        this.particles.push(new Particle(bx, by, -2, -6, 'brick', 30));
        this.particles.push(new Particle(bx + 8, by, 0, -7, 'brick', 30));
        this.particles.push(new Particle(bx + 16, by, 2, -6, 'brick', 30));
        this.particles.push(new Particle(bx + 4, by + 8, -1, -5, 'brick', 28));
        this.particles.push(new Particle(bx + 20, by + 8, 1, -5, 'brick', 28));
      }
    }
  }

  checkEnemyCollisions() {
    if (this.player.deadTimer > 0 || this.player.isInvincible) return;
    const pb = this.player.getBounds();
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      const eb = enemy.getBounds();
      if (!eb) continue;
      if (pb.x < eb.x + eb.w && pb.x + pb.w > eb.x && pb.y < eb.y + eb.h && pb.y + pb.h > eb.y) {
        const playerBottomPrev = pb.y + pb.h - this.player.vy;
        if (this.player.vy > 0 && playerBottomPrev <= eb.y + eb.h * 0.4) {
          enemy.squish();
          this.player.vy = -8;
          this.score += 100;
          this.particles.push(new Particle(eb.x + eb.w / 2, eb.y, 0, -3, 'score', 20));
        } else {
          this.playerHit();
        }
        break;
      }
    }
  }

  playerHit() {
    if (this.player.isInvincible || this.player.deadTimer > 0) return;
    this.playerDie();
  }

  playerDie() {
    this.lives--;
    this.player.die();
    this.state = STATE.DEAD;
    this.deathDelay = 60;
  }

  checkFlagPole() {
    if (this.player.deadTimer > 0) return;
    const flagCol = 198;
    const flagX = flagCol * TILE_SIZE;
    if (this.player.x + this.player.width > flagX && this.player.x < flagX + TILE_SIZE) {
      this.score += 2000;
      this.state = STATE.LEVEL_CLEAR;
      this.levelClearTimer = 90;
    }
  }

  render() {
    // Sky background (changes per level)
    if (this.level === 2) {
      // Underground: dark
      const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
      grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#16213e');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    } else if (this.level === 3) {
      // Sky: bright blue
      const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
      grad.addColorStop(0, '#4A90D9'); grad.addColorStop(1, '#87CEEB');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    } else {
      const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
      grad.addColorStop(0, '#5C94FC'); grad.addColorStop(1, '#A8D8FF');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    }

    // Draw tiles
    const startCol = Math.floor(this.camera.x / TILE_SIZE);
    const endCol = Math.min(MAP_COLS - 1, Math.ceil((this.camera.x + CANVAS_WIDTH) / TILE_SIZE));

    for (let r = 0; r < MAP_ROWS; r++) {
      for (let c = startCol; c <= endCol; c++) {
        const tile = this.map[r][c];
        if (tile === TILE.AIR) continue;
        const bx = c * TILE_SIZE - this.camera.x, by = r * TILE_SIZE;
        const bumpData = this.bumpBlocks.get(`${c},${r}`);
        drawTile(ctx, tile, bx, by, bumpData ? bumpData.offset : 0);
      }
    }

    for (const enemy of this.enemies) enemy.render(ctx, this.camera);
    for (const particle of this.particles) particle.render(ctx, this.camera);
    this.player.render(ctx, this.camera);

    this.drawHUD();

    if (this.state === STATE.START) this.drawStartScreen();
    else if (this.state === STATE.LEVEL_CLEAR) this.drawLevelClearScreen();
    else if (this.state === STATE.DEAD && this.deathDelay <= 0 && this.player.y > CANVAS_HEIGHT + 100) this.drawGameOverScreen();
    else if (this.state === STATE.WIN && this.winTimer < 150) this.drawWinScreen();
  }

  drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, CANVAS_WIDTH, 36);
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 16px "Courier New"'; ctx.textAlign = 'left';
    ctx.fillText(`MARIO`, 16, 16);
    ctx.fillText(`${String(this.score).padStart(6, '0')}`, 16, 32);

    ctx.textAlign = 'center';
    ctx.fillText(`×${String(this.coins).padStart(2, '0')}`, CANVAS_WIDTH / 2 + 40, 24);
    ctx.fillStyle = '#F8B800'; ctx.fillRect(CANVAS_WIDTH / 2 + 10, 12, 10, 14);
    ctx.fillStyle = '#FFE000'; ctx.fillRect(CANVAS_WIDTH / 2 + 12, 14, 6, 10);

    ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'right';
    ctx.fillText(`WORLD`, CANVAS_WIDTH - 100, 16);
    ctx.fillText(`1-${this.level}`, CANVAS_WIDTH - 100, 32);
    ctx.fillText(`LIVES: ${this.lives}`, CANVAS_WIDTH - 16, 16);
    ctx.textAlign = 'start';
  }

  drawStartScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
    ctx.font = 'bold 36px "Courier New"'; ctx.fillText('SUPER  MARIO', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 60);
    ctx.font = '18px "Courier New"'; ctx.fillText('3 LEVELS · SIMPLIFIED EDITION', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
    ctx.fillStyle = '#F8B800'; ctx.font = 'bold 20px "Courier New"';
    ctx.fillText('PRESS ANY KEY TO START', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 40);
    ctx.fillStyle = '#AAAAAA'; ctx.font = '14px "Courier New"';
    ctx.fillText('← → : Move    ↑ / SPACE : Jump', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 80);
    ctx.fillText('Stomp enemies from above!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 100);
    ctx.textAlign = 'start';
  }

  drawLevelClearScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#F8B800'; ctx.textAlign = 'center';
    ctx.font = 'bold 28px "Courier New"';
    ctx.fillText(`LEVEL 1-${this.level} CLEAR!`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 10);
    ctx.fillStyle = '#FFFFFF'; ctx.font = '18px "Courier New"';
    if (this.level < 3) {
      ctx.fillText(`GET READY FOR LEVEL 1-${this.level + 1}...`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
    } else {
      ctx.fillText('FINAL LEVEL COMPLETE!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
    }
    ctx.textAlign = 'start';
  }

  drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#E52521'; ctx.textAlign = 'center';
    ctx.font = 'bold 36px "Courier New"'; ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
    ctx.fillStyle = '#FFFFFF'; ctx.font = '18px "Courier New"';
    ctx.fillText(`FINAL SCORE: ${this.score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
    ctx.fillStyle = '#F8B800'; ctx.font = 'bold 16px "Courier New"';
    ctx.fillText('PRESS SPACE TO RESTART', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 70);
    ctx.textAlign = 'start';
  }

  drawWinScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#F8B800'; ctx.textAlign = 'center';
    ctx.font = 'bold 36px "Courier New"'; ctx.fillText('YOU WIN!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 30);
    ctx.fillStyle = '#FFFFFF'; ctx.font = '18px "Courier New"';
    ctx.fillText(`SCORE: ${this.score}    COINS: ${this.coins}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);
    ctx.fillStyle = '#F8B800'; ctx.font = 'bold 16px "Courier New"';
    ctx.fillText('PRESS SPACE TO PLAY AGAIN', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);
    ctx.textAlign = 'start';
  }
}

// ==================== GAME LOOP ====================
const game = new Game();
function gameLoop() { game.update(); game.render(); requestAnimationFrame(gameLoop); }
requestAnimationFrame(gameLoop);
</script>
